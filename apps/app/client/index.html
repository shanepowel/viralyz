<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Viralyz — The creator operating system</title>
    <meta name="description" content="Every tool feeds one intelligence layer — your Viral Score history — which becomes your verified track record. Create, score, publish, and prove performance." />
    <meta property="og:title" content="Viralyz — The creator operating system" />
    <meta property="og:description" content="One Viral Score spine. Every tool reads and writes the same content graph." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7C5CFF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed'));
        });
      }
    </script>
  </body>
